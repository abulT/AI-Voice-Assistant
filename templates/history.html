<!DOCTYPE html>
<html>
<head>
    <title>History</title>
    <style>
        body{
            font-family: Arial;
            margin:40px;
            background:#f5f5f5;
        }

        table{
            border-collapse: collapse;
            width:100%;
            background:white;
        }

        th,td{
            border:1px solid #ddd;
            padding:10px;
            text-align:left;
        }

        th{
            background:#2196F3;
            color:white;
        }

        tr:nth-child(even){
            background:#f2f2f2;
        }

        h1{
            text-align:center;
        }
    </style>
</head>

<body>

<h1>Upload History</h1>

<form action="/history" method="GET">

    <input
        type="text"
        name="search"
        placeholder="Search here">

    <button type="submit">Search</button>

</form>

<br>

<table>

<tr>
    <th>ID</th>
    <th>File</th>
    <th>Transcript</th>
    <th>Summary</th>
    <th>Date</th>
    <th>Delete</th>
</tr>

{% for row in rows %}

<tr>

<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>

<td>
    <a href="/delete/{{row[0]}}">
        Delete
    </a>
</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">← Home</a>

</body>
</html>
